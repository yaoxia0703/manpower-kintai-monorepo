server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:manpower_kintai}?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: ${MYSQL_USER:app}
    password: ${MYSQL_PWD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:manpower-kintai}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.mybatis: INFO
    com.baomidou.mybatisplus: INFO
