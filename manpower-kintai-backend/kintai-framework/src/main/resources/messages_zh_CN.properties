# 通用错误
success.ok=成功
error.bad_request=错误的请求
error.unauthorized=未认证
error.forbidden=没有操作权限
error.not_found=数据未找到
error.too_many_requests=请求过多，请稍后再试
error.validation=参数校验失败
error.business=业务异常
error.server=服务器内部错误
error.unavailable=服务暂不可用
error.method_not_allowed=请求方法不被允许
error.unsupported_media_type=不支持的媒体类型
error.missing_param=缺少必要参数：{0}

